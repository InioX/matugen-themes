# ===================================================================
# 🎨 FOOT MATUGEN THEME 
# ===================================================================

[colors-dark]
# Cursor Colors (Format: <text-color> <cursor-color>)
cursor={{colors.on_surface_variant.default.hex_stripped}} {{colors.on_surface.default.hex_stripped}}

# Base UI Colors
foreground={{colors.on_surface.default.hex_stripped}}
background={{colors.surface.default.hex_stripped}}
selection-foreground={{colors.on_secondary.default.hex_stripped}}
selection-background={{colors.secondary_fixed_dim.default.hex_stripped}}
urls={{colors.primary.default.hex_stripped}}

# ===================================================================
# 16-COLOR TERMINAL PALETTE
# ===================================================================
# Normal colors
regular0=4c4c4c  # black
regular1=ac8a8c  # red
regular2=8aac8b  # green
regular3=aca98a  # yellow
regular4={{colors.primary.default.hex_stripped}}  # blue (Matugen dynamically injected)
regular5=ac8aac  # magenta
regular6=8aacab  # cyan
regular7=f0f0f0  # white

# Bright colors
bright0=262626   # bright black
bright1=c49ea0   # bright red
bright2=9ec49f   # bright green
bright3=c4c19e   # bright yellow
bright4=a39ec4   # bright blue
bright5=c49ec4   # bright magenta
bright6=9ec3c4   # bright cyan
bright7=e7e7e7   # bright white
